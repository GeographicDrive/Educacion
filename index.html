/* Almacenamiento */
const Storage = (function(){
  let backend = null;
  let memory = {};
  let degraded = false;

  function test(store){
    try{
      const k = '__test__' + Math.random();
      store.setItem(k, '1');
      store.removeItem(k);
      return true;
    }catch(e){ return false; }
  }

  if(typeof localStorage !== 'undefined' && test(localStorage)){
    backend = localStorage;
  } else if(typeof sessionStorage !== 'undefined' && test(sessionStorage)){
    backend = sessionStorage;
    degraded = true;
  } else {
    degraded = true;
  }

  function get(key){
    if(backend){ try{ return backend.getItem(key); }catch(e){} }
    return Object.prototype.hasOwnProperty.call(memory, key) ? memory[key] : null;
  }
  function set(key, val){
    if(backend){ try{ backend.setItem(key, val); return; }catch(e){} }
    memory[key] = val;
  }
  function remove(key){
    if(backend){ try{ backend.removeItem(key); }catch(e){} }
    delete memory[key];
  }

  return { get, set, remove, isDegraded: ()=>degraded };
})();

function showStorageWarningIfNeeded(){
  if(!Storage.isDegraded()) return;
  const banner = document.createElement('div');
  banner.className = 'max-w-6xl mx-auto px-4';
  banner.innerHTML = `
    <div class="bg-amber-50 border border-amber-300 text-amber-800 text-xs rounded-xl p-3 mt-3 flex items-start gap-2">
      <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
      <div>
        <b>Tu navegador está bloqueando el guardado permanente</b> (esto pasa a veces al abrir el archivo
        directamente con doble clic, protocolo <code>file://</code>). Tu progreso, API key y ejercicios se
        guardarán solo mientras esta pestaña esté abierta. Para guardar de forma permanente, prueba abrir el
        archivo desde un servidor local o revisa la configuración de cookies/almacenamiento de tu navegador.
      </div>
    </div>`;
  document.querySelector('header').insertAdjacentElement('afterend', banner);
}

/* Estado */
const STATE_STORAGE_KEY = 'estudio8_state_v1';

function loadState(){
  const raw = Storage.get(STATE_STORAGE_KEY);
  let saved = {};
  if(raw){
    try{ saved = JSON.parse(raw); }catch(e){ saved = {}; }
  }
  const st = {};
  Object.keys(SUBJECTS).forEach(k=>{
    const total = SUBJECTS[k].oas.length;
    const savedArr = Array.isArray(saved[k]) ? saved[k] : [];
    st[k] = Array.from({length: total}, (_, i) => !!savedArr[i]);
  });
  return st;
}

function persistState(){
  Storage.set(STATE_STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

/* Render tabs */
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
let activeTab = Object.keys(SUBJECTS)[0];

function colorClasses(color, active){
  const map = {
    sky:   active? "text-sky-600 bg-sky-50" : "text-slate-500",
    amber: active? "text-amber-600 bg-amber-50" : "text-slate-500",
    emerald: active? "text-emerald-600 bg-emerald-50" : "text-slate-500",
    rose: active? "text-rose-600 bg-rose-50" : "text-slate-500",
    violet: active? "text-violet-600 bg-violet-50" : "text-slate-500",
  };
  return map[color];
}

function renderTabs(){
  tabsEl.innerHTML = '';
  Object.entries(SUBJECTS).forEach(([key, s])=>{
    const btn = document.createElement('button');
    btn.className = `tab-btn flex items-center gap-2 px-4 py-3 text-sm font-semibold whitespace-nowrap rounded-t-lg transition ${colorClasses(s.color, key===activeTab)} ${key===activeTab?'active':''}`;
    btn.innerHTML = `<i class="fa-solid ${s.icon}"></i> ${s.name} <span class="text-[10px] bg-slate-200 text-slate-600 rounded-full px-2 py-0.5" id="badge-${key}"></span>`;
    btn.onclick = ()=>{ activeTab = key; renderTabs(); renderContent(); };
    tabsEl.appendChild(btn);
  });
  updateBadges();
}

function updateBadges(){
  Object.keys(SUBJECTS).forEach(key=>{
    const done = state[key].filter(Boolean).length;
    const total = state[key].length;
    const b = document.getElementById(`badge-${key}`);
    if(b) b.textContent = `${done}/${total}`;
  });
  updateGlobal();
}

      </div>
    </div>

    <div class="space-y-2" id="oa-list"></div>
  </section>`;

  s.oas.forEach((oa, idx)=>{
    const [code, desc] = oa;
    const rowId = `oa-${activeTab}-${idx}`;
    const row = document.createElement('div');
    row.className = `p-3 rounded-xl border transition oa-row ${state[activeTab][idx]?'bg-emerald-50 border-emerald-200':'bg-slate-50 border-slate-200'}`;

      <div class="flex items-start gap-3">
        <input type="checkbox" ${state[activeTab][idx]?'checked':''} class="mt-1 w-5 h-5 accent-${s.color}-600 cursor-pointer"
          onchange="toggleOA('${activeTab}', ${idx})">

        </div>
        <button onclick="generateExercise('${activeTab}', ${idx}, '${rowId}')" id="btn-${rowId}"
          class="shrink-0 bg-${s.color}-600 hover:bg-${s.color}-700 text-white text-xs font-semibold px-3 py-2 rounded-lg flex items-center gap-1 whitespace-nowrap">
          <i class="fa-solid ${(exerciseCache[cacheKeyFor(activeTab, idx)] && exerciseCache[cacheKeyFor(activeTab, idx)].length) ? 'fa-eye' : 'fa-wand-magic-sparkles'}"></i>
          ${(exerciseCache[cacheKeyFor(activeTab, idx)] && exerciseCache[cacheKeyFor(activeTab, idx)].length) ? 'Ver ejercicio' : 'Generar ejercicio'}
        </button>
      </div>
      <div id="ex-${rowId}" class="hidden mt-3 p-3 rounded-lg bg-white border border-dashed border-${s.color}-300 text-sm text-slate-700"></div>`;
    list.appendChild(row);
  });
  applySearch();
}

/* API KEY DE GROQ */
const GROQ_STORAGE_KEY = 'estudio8_groq_api_key';

function getGroqKey(){
  return Storage.get(GROQ_STORAGE_KEY) || '';
}
function setGroqKey(key){
  Storage.set(GROQ_STORAGE_KEY, key);
}
function removeGroqKey(){
  Storage.remove(GROQ_STORAGE_KEY);
}

function updateKeyStatusUI(){
  const key = getGroqKey();
  const status = document.getElementById('apikey-status');
  const input = document.getElementById('groq-key-input');
  const dot = document.getElementById('apikey-status-dot');
  if(key){
    status.textContent = 'Configurada ✓';
    status.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-emerald-100 text-emerald-700';
    input.value = key;
    if(dot){ dot.classList.remove('bg-red-400'); dot.classList.add('bg-emerald-400'); }
  } else {
    status.textContent = 'Sin configurar';
    status.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-red-100 text-red-600';
    input.value = '';
    if(dot){ dot.classList.remove('bg-emerald-400'); dot.classList.add('bg-red-400'); }
  }
}

function openApiKeyModal(){
  document.getElementById('apikey-modal').classList.remove('hidden');
}
function closeApiKeyModal(){
  document.getElementById('apikey-modal').classList.add('hidden');
}

function saveGroqKey(){
  const val = document.getElementById('groq-key-input').value.trim();
  if(!val){ alert('Escribe tu API key de Groq antes de guardar.'); return; }
  setGroqKey(val);
  const check = getGroqKey();
  updateKeyStatusUI();
  if(check === val){
    const status = document.getElementById('apikey-status');
    const old = status.textContent;
    status.textContent = '¡Guardada! ✓';
    setTimeout(()=>{ status.textContent = old; }, 1500);
    closeApiKeyModal();
  } else {
    alert('No se pudo guardar la key de forma permanente en este navegador. Se usará solo durante esta sesión.');
  }
}

function clearGroqKey(){
  removeGroqKey();
  updateKeyStatusUI();
}

function toggleKeyVisibility(){
  const input = document.getElementById('groq-key-input');
  const icon = document.getElementById('eye-icon');
  if(input.type === 'password'){ input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
}

/* Cache de ejercicios */
const EXERCISES_STORAGE_KEY = 'estudio8_exercises_v1';

function loadExerciseCache(){
  const raw = Storage.get(EXERCISES_STORAGE_KEY);
  if(!raw) return {};
  try{ return JSON.parse(raw); }catch(e){ return {}; }
}
function saveExerciseCache(){
  Storage.set(EXERCISES_STORAGE_KEY, JSON.stringify(exerciseCache));
}
let exerciseCache = loadExerciseCache();

function cacheKeyFor(subject, idx){ return `${subject}:${idx}`; }

function renderExerciseBox(box, s, subject, idx, rowId, ejercicio, respuesta, fromCache){
  box.innerHTML = `
    ${fromCache ? `<p class="text-[11px] text-slate-400 mb-1"><i class="fa-solid fa-database"></i> Ejercicio guardado (no gastó IA)</p>` : ''}
    <p class="font-semibold text-${s.color}-700 mb-1"><i class="fa-solid fa-pen-ruler"></i> Ejercicio</p>
    <p class="mb-3 whitespace-pre-line">${ejercicio}</p>
    ${respuesta ? `
      <button class="text-xs text-${s.color}-600 underline mb-2" onclick="this.nextElementSibling.classList.toggle('hidden')">Mostrar / ocultar respuesta</button>
      <div class="hidden bg-${s.color}-50 border border-${s.color}-200 rounded-lg p-2 whitespace-pre-line">${respuesta}</div>
    ` : ''}
    <button onclick="generateExercise('${subject}', ${idx}, '${rowId}', true)" class="mt-3 text-xs text-slate-400 hover:text-slate-600">
      <i class="fa-solid fa-rotate"></i> Generar otro ejercicio (usa IA)
    </button>`;
}

/* Generador de ejercicios */
async function generateExercise(subject, idx, rowId, forceNew){
  const s = SUBJECTS[subject];
  const [code, desc] = s.oas[idx];
  const btn = document.getElementById(`btn-${rowId}`);
  const box = document.getElementById(`ex-${rowId}`);
  const apiKey = getGroqKey();

  box.classList.remove('hidden');

  const cKey = cacheKeyFor(subject, idx);
  const cached = exerciseCache[cKey];
  if(!forceNew && cached && cached.length){
    const last = cached[cached.length - 1];
    renderExerciseBox(box, s, subject, idx, rowId, last.ejercicio, last.respuesta, true);
    return;
  }

  if(!apiKey){
    box.innerHTML = `<p class="text-amber-600"><i class="fa-solid fa-triangle-exclamation"></i>
      Primero configura tu API key gratis de Groq (botón ⚙️ arriba a la derecha).</p>
      <button onclick="openApiKeyModal();"
        class="mt-2 text-xs text-indigo-600 underline">Ir a configurar mi API key</button>`;
    return;
  }

  box.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Generando ejercicio para <b>${code}</b>...`;
  btn.disabled = true;
  btn.classList.add('opacity-60','cursor-wait');

  const prompt = `Eres un profesor chileno de 8vo básico creando material de estudio.
Genera UN ejercicio de práctica breve (en español) para la asignatura "${s.name}", basado en este Objetivo de Aprendizaje del currículum MINEDUC:
"${code}: ${desc}"

Responde EXACTAMENTE con este formato, sin agregar nada más:
EJERCICIO: <enunciado del ejercicio o pregunta>
RESPUESTA: <respuesta correcta explicada brevemente>`;

  try{
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.8
      })
    });

    if(res.status === 401){ throw new Error('unauthorized'); }
    if(!res.ok){ throw new Error('bad_response'); }

    const data = await res.json();
    let text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
    text = text.trim();

    let ejercicio = text, respuesta = '';
    const match = text.match(/EJERCICIO:\s*([\s\S]*?)\s*RESPUESTA:\s*([\s\S]*)/i);
    if(match){ ejercicio = match[1].trim(); respuesta = match[2].trim(); }

    if(!exerciseCache[cKey]) exerciseCache[cKey] = [];
    exerciseCache[cKey].push({ ejercicio, respuesta, ts: Date.now() });
    saveExerciseCache();

    renderExerciseBox(box, s, subject, idx, rowId, ejercicio, respuesta, false);
  }catch(err){
    let msg = 'No se pudo generar el ejercicio. Intenta de nuevo.';
    if(err.message === 'unauthorized'){
      msg = 'Tu API key de Groq no es válida o expiró. Revísala en la sección "Configuración de IA".';
    }
    box.innerHTML = `<p class="text-red-500"><i class="fa-solid fa-triangle-exclamation"></i> ${msg}</p>
      <button onclick="generateExercise('${subject}', ${idx}, '${rowId}', true)" class="mt-2 text-xs text-${s.color}-600 underline">Reintentar</button>`;
  }finally{
    btn.disabled = false;
    btn.classList.remove('opacity-60','cursor-wait');
  }
}

  state[subject][idx] = !state[subject][idx];
  persistState();

document.getElementById('search').addEventListener('input', applySearch);

/* Grafico global */
let globalChart;
function updateGlobal(){
  let done=0, total=0;
  Object.keys(state).forEach(k=>{ done += state[k].filter(Boolean).length; total += state[k].length; });
  const pct = total? Math.round((done/total)*100) : 0;
  document.getElementById('global-percent').textContent = pct+'%';

  const ctx = document.getElementById('globalChart');
  const data = { datasets: [{ data:[pct,100-pct], backgroundColor:['#facc15','rgba(255,255,255,0.25)'], borderWidth:0 }] };
  if(globalChart){ globalChart.data = data; globalChart.update(); }
  else {
    globalChart = new Chart(ctx, { type:'doughnut', data, options:{ cutout:'70%', plugins:{legend:{display:false},tooltip:{enabled:false}} } });
  }
}

/* Visor PDF*/
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let pdfDoc = null, pdfPageNum = 1;

async function openPdf(filename, title){
  const section = document.getElementById('pdf-section');
  section.classList.remove('hidden');
  document.getElementById('pdf-title').innerHTML = `<i class="fa-solid fa-book-open text-rose-500"></i> ${title} — <span class="text-slate-400 text-sm">${filename}</span>`;
  document.getElementById('pdf-download').href = filename;
  section.scrollIntoView({behavior:'smooth'});
  try{
    pdfDoc = await pdfjsLib.getDocument(filename).promise;
    pdfPageNum = 1;
    renderPdfPage();
  }catch(err){
    document.getElementById('pdf-page-info').textContent = 'No se pudo cargar';
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; canvas.height = 120;
    ctx.fillStyle = '#f8fafc'; ctx.fillRect(0,0,600,120);
    ctx.fillStyle = '#94a3b8'; ctx.font = '16px Nunito';
    ctx.fillText(`⚠ Coloca "${filename}" en la misma carpeta que este HTML para verlo aquí.`, 20, 60);
  }
}

async function renderPdfPage(){
  if(!pdfDoc) return;
  const page = await pdfDoc.getPage(pdfPageNum);
  const viewport = page.getViewport({scale: 1.3});
  const canvas = document.getElementById('pdf-canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
  document.getElementById('pdf-page-info').textContent = `${pdfPageNum} / ${pdfDoc.numPages}`;
}
function pdfNext(){ if(pdfDoc && pdfPageNum < pdfDoc.numPages){ pdfPageNum++; renderPdfPage(); } }
function pdfPrev(){ if(pdfDoc && pdfPageNum > 1){ pdfPageNum--; renderPdfPage(); } }

showStorageWarningIfNeeded();
